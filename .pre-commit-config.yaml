repos:
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.150.0
    hooks:
      - id: renovate-config-validator
        args: [--strict]
        # Default regex only matches renovate.json/.renovaterc. Override to validate
        # every preset in this repo so newly added *.json5 configs are picked up
        # automatically without touching this file.
        files: '\.json5$'
